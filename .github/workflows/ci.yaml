name: CI

# 릴리스 태그(v*)를 push할 때만 이미지를 빌드/푸시한다 (릴리스 주도 배포).
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    # WIF OIDC용 id-token, 매니페스트 자동 push용 contents write
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # 로컬과 동일한 uv.lock으로 설치 후 테스트 (dev/CI 정합)
      - name: Run tests
        working-directory: app
        run: |
          uv sync --frozen
          uv run pytest -q

      # 키리스 인증: GitHub OIDC 토큰을 WIF로 교환해 notiflex-ci SA로 행세 (저장된 키 없음)
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: project-b3c5c78c-8a5c-4e47-9fe
          workload_identity_provider: projects/670399378426/locations/global/workloadIdentityPools/gh-pool/providers/github
          service_account: notiflex-ci@project-b3c5c78c-8a5c-4e47-9fe.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      # runner(amd64)에서 직접 빌드. git 태그를 이미지 태그이자 APP_VERSION으로 주입한다.
      - name: Build and push image
        working-directory: app
        run: |
          IMAGE="asia-northeast3-docker.pkg.dev/project-b3c5c78c-8a5c-4e47-9fe/notiflex-platform/notiflex-api:${GITHUB_REF_NAME}"
          docker build --build-arg APP_VERSION="${GITHUB_REF_NAME}" -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Pushed $IMAGE"

      # CD 연결: 매니페스트 이미지 태그를 릴리스 버전으로 갱신 → main에 push → ArgoCD가 감지해 자동 배포
      - name: Update manifest and push to main
        run: |
          set -euo pipefail
          IMAGE_URI="asia-northeast3-docker.pkg.dev/project-b3c5c78c-8a5c-4e47-9fe/notiflex-platform/notiflex-api:${GITHUB_REF_NAME}"
          echo "Target image: ${IMAGE_URI}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          sed -i "s|image: .*notiflex-api:.*|image: ${IMAGE_URI}|" k8s/smb/deployment.yaml
          grep "image:" k8s/smb/deployment.yaml
          if git diff --quiet k8s/smb/deployment.yaml; then
            echo "manifest already up to date, nothing to commit"
            exit 0
          fi
          git add k8s/smb/deployment.yaml
          git commit -m "ci: deploy notiflex-api ${GITHUB_REF_NAME}"
          git push origin main
