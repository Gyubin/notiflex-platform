apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    # kube-prometheus-stackмқҳ PrometheusлҠ” serviceMonitorSelectorлЎң
    # release=kube-prometheus лқјлІЁмқҙ л¶ҷмқҖ ServiceMonitorл§Ң мұ„нғқн•ңлӢӨ.
    release: kube-prometheus
spec:
  selector:
    matchLabels:
      app: notiflex-api
  namespaceSelector:
    matchNames:
      - notiflex
  endpoints:
    - port: http          # Serviceмқҳ нҸ¬нҠё мқҙлҰ„(http, 8080)
      path: /metrics
      interval: 30s
