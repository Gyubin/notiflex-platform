apiVersion: v1
kind: ConfigMap
metadata:
  name: notiflex-dashboard
  namespace: monitoring
  labels:
    # kube-prometheus-stack Grafana 사이드카가 이 라벨을 감지해 대시보드를 자동 임포트한다.
    grafana_dashboard: "1"
data:
  notiflex.json: |
    {
      "title": "Notiflex API",
      "uid": "notiflex-api",
      "tags": ["notiflex"],
      "timezone": "browser",
      "schemaVersion": 39,
      "editable": true,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Data source",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Pod CPU 사용량 (cores)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"notiflex\", pod=~\"notiflex-api.*\", container=\"notiflex-api\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Memory (working set)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"notiflex\", pod=~\"notiflex-api.*\", container=\"notiflex-api\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP 요청 수 (req/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{namespace=\"notiflex\", handler!=\"/metrics\"}[5m])) by (handler, status)",
              "legendFormat": "{{handler}} ({{status}})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Pod 재시작 횟수",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"notiflex\", pod=~\"notiflex-api.*\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
